<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | IronFit Gym</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&q=80') center/cover; padding: 250px 0 120px; text-align: left; }
        .schedule-table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 4rem; }
        .schedule-table th, .schedule-table td { padding: 2rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
        .schedule-table th { font-family: var(--font-heading); font-size: 1.5rem; color: var(--text-secondary); font-weight: 500; font-style: normal; text-transform: uppercase; letter-spacing: 2px;}
        .class-row { transition: background 0.2s; cursor: pointer; }
        .class-row:hover { background: rgba(255, 69, 0, 0.05); }
        .class-time { font-family: var(--font-body); font-weight: 700; color: var(--accent-primary); font-size: 1.2rem; }
        .class-name { font-family: var(--font-heading); font-size: 2rem; font-style: italic; color: var(--text-primary); }
    </style>
</head>
<body>
    <gym-navbar></gym-navbar>
    <main>
        <scroll-fade-controller></scroll-fade-controller>
        
        <header class="page-header scroll-fade visible">
            <div class="container">
                <h1>The <span class="text-accent">Protocol.</span></h1>
            </div>
        </header>

        <section class="section scroll-fade">
            <div class="container">
                <!-- Using a list format instead of a cramped table for an aggressive modern look -->
                <div style="overflow-x: auto;">
                    <table class="schedule-table">
                        <thead>
                            <tr>
                                <th>Schedule</th>
                                <th>Session</th>
                                <th>Lead</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="class-row" onclick="alert('Booking morning strength')">
                                <td class="class-time">06:00 AM</td>
                                <td class="class-name">Raw Strength</td>
                                <td class="text-secondary">Alex R.</td>
                                <td><span style="border-bottom: 1px solid var(--accent-primary); color: var(--text-primary); font-weight:bold; letter-spacing:1px;">BOOK</span></td>
                            </tr>
                            <tr class="class-row" onclick="alert('Booking Conditioning')">
                                <td class="class-time">12:00 PM</td>
                                <td class="class-name">Conditioning</td>
                                <td class="text-secondary">Sarah J.</td>
                                <td><span style="border-bottom: 1px solid var(--accent-primary); color: var(--text-primary); font-weight:bold; letter-spacing:1px;">BOOK</span></td>
                            </tr>
                            <tr class="class-row" onclick="alert('Booking Combat')">
                                <td class="class-time">06:00 PM</td>
                                <td class="class-name">Striking Clinic</td>
                                <td class="text-secondary">Marcus C.</td>
                                <td><span style="border-bottom: 1px solid var(--accent-primary); color: var(--text-primary); font-weight:bold; letter-spacing:1px;">BOOK</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
    <whatsapp-button></whatsapp-button>
    <gym-footer></gym-footer>
    <script src="components.js"></script>
</body>
</html>
